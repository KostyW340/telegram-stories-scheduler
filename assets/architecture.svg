<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="620" viewBox="0 0 1280 620" role="img" aria-label="Telegram Stories Scheduler architecture">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="0.52" stop-color="#102a43"/>
      <stop offset="1" stop-color="#0f3b57"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1280" height="620" rx="32" fill="url(#bg)"/>
  <circle cx="1130" cy="90" r="180" fill="#22d3ee" opacity="0.12"/>
  <circle cx="140" cy="520" r="210" fill="#38bdf8" opacity="0.10"/>
  <text x="70" y="86" fill="#e0f2fe" font-family="Verdana, sans-serif" font-size="40" font-weight="700">Telegram Stories Scheduler</text>
  <text x="70" y="124" fill="#93c5fd" font-family="Verdana, sans-serif" font-size="18">Bot control plane + MTProto publishing worker + resilient SQLite scheduler</text>
  <g filter="url(#shadow)" font-family="Verdana, sans-serif">
    <g transform="translate(70 190)">
      <rect width="210" height="112" rx="22" fill="url(#card)"/>
      <text x="28" y="45" fill="#0f172a" font-size="20" font-weight="700">Bot UI</text>
      <text x="28" y="77" fill="#334155" font-size="14">aiogram handlers</text>
    </g>
    <g transform="translate(360 190)">
      <rect width="235" height="112" rx="22" fill="url(#card)"/>
      <text x="28" y="45" fill="#0f172a" font-size="20" font-weight="700">Story Jobs</text>
      <text x="28" y="77" fill="#334155" font-size="14">FSM + service layer</text>
    </g>
    <g transform="translate(680 190)">
      <rect width="235" height="112" rx="22" fill="url(#card)"/>
      <text x="28" y="45" fill="#0f172a" font-size="20" font-weight="700">SQLite</text>
      <text x="28" y="77" fill="#334155" font-size="14">SQLAlchemy + Alembic</text>
    </g>
    <g transform="translate(1000 190)">
      <rect width="210" height="112" rx="22" fill="url(#card)"/>
      <text x="28" y="45" fill="#0f172a" font-size="20" font-weight="700">Worker</text>
      <text x="28" y="77" fill="#334155" font-size="14">retry + catch-up</text>
    </g>
    <g transform="translate(220 410)">
      <rect width="250" height="112" rx="22" fill="url(#card)"/>
      <text x="28" y="45" fill="#0f172a" font-size="20" font-weight="700">Media Pipeline</text>
      <text x="28" y="77" fill="#334155" font-size="14">Pillow + FFmpeg</text>
    </g>
    <g transform="translate(565 410)">
      <rect width="250" height="112" rx="22" fill="url(#card)"/>
      <text x="28" y="45" fill="#0f172a" font-size="20" font-weight="700">MTProto Runtime</text>
      <text x="28" y="77" fill="#334155" font-size="14">Telethon user session</text>
    </g>
    <g transform="translate(910 410)">
      <rect width="230" height="112" rx="22" fill="#bae6fd"/>
      <text x="28" y="45" fill="#0f172a" font-size="20" font-weight="700">Telegram Stories</text>
      <text x="28" y="77" fill="#334155" font-size="14">publish + diagnostics</text>
    </g>
  </g>
  <g stroke="#7dd3fc" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.88">
    <path d="M280 246h80"/>
    <path d="M595 246h85"/>
    <path d="M915 246h85"/>
    <path d="M1110 302c0 82-92 108-190 151"/>
    <path d="M680 446H470"/>
    <path d="M815 466h95"/>
  </g>
  <g fill="#7dd3fc">
    <path d="M352 236l18 10-18 10z"/>
    <path d="M672 236l18 10-18 10z"/>
    <path d="M992 236l18 10-18 10z"/>
    <path d="M909 443l18 8-16 12z"/>
  </g>
